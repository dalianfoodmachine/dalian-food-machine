name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dalian-food-machine/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          rm -f ../package.json
          pnpm install --frozen-lockfile
        working-directory: dalian-food-machine

      - name: Build
        run: pnpm exec opennextjs-cloudflare build
        working-directory: dalian-food-machine
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}

      # Production deploy (push to main only)
      - name: Deploy to Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm exec opennextjs-cloudflare deploy
        working-directory: dalian-food-machine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Preview deploy (push to dev)
      - name: Deploy Preview
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: pnpm exec wrangler deploy --env preview
        working-directory: dalian-food-machine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
