name = "dalian-food-machine"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Self-reference for caching (ISR/revalidation)
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "dalian-food-machine"

# Preview 環境（dev branch 部署用）
[env.preview]
name = "dalian-food-machine-preview"

[env.preview.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[env.preview.services]]
binding = "WORKER_SELF_REFERENCE"
service = "dalian-food-machine-preview"
